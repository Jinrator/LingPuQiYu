<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>采样文件生成器</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    .info { background: #f0f9ff; border: 1px solid #bae6fd; padding: 16px; border-radius: 8px; margin: 20px 0; }
    button { background: #4f46e5; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 8px 4px; }
    button:hover { background: #4338ca; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    #log { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
    .progress { background: #e2e8f0; border-radius: 4px; height: 8px; margin: 8px 0; }
    .progress-bar { background: #4f46e5; height: 100%; border-radius: 4px; transition: width 0.3s; }
  </style>
</head>
<body>
  <h1>🎵 采样文件生成器</h1>
  <div class="info">
    <p>此工具使用 Web Audio API 离线渲染生成高品质鼓组和中国传统乐器采样文件。</p>
    <p>生成的 WAV 文件需要放到项目的 <code>public/samples/</code> 目录下。</p>
    <p>你也可以用真实录音的采样文件替换这些合成文件，只需保持相同的文件名和目录结构。</p>
  </div>
  
  <button onclick="generateDrumSamples('acoustic')">生成原声鼓组</button>
  <button onclick="generateDrumSamples('electronic')">生成电子鼓组 (808)</button>
  <button onclick="generateDrumSamples('chinese')">生成中国打击乐</button>
  <button onclick="generateChineseSamples()">生成中国传统乐器</button>
  <button onclick="generateAll()">全部生成</button>
  
  <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div id="log">等待操作...\n</div>

  <script>
    const log = document.getElementById('log');
    const progressBar = document.getElementById('progressBar');
    
    function addLog(msg) {
      log.textContent += msg + '\n';
      log.scrollTop = log.scrollHeight;
    }
    
    function setProgress(pct) {
      progressBar.style.width = pct + '%';
    }

    // 将 AudioBuffer 转为 WAV Blob
    function audioBufferToWav(buffer) {
      const numChannels = buffer.numberOfChannels;
      const sampleRate = buffer.sampleRate;
      const format = 1; // PCM
      const bitDepth = 16;
      const bytesPerSample = bitDepth / 8;
      const blockAlign = numChannels * bytesPerSample;
      const dataLength = buffer.length * blockAlign;
      const headerLength = 44;
      const totalLength = headerLength + dataLength;
      
      const arrayBuffer = new ArrayBuffer(totalLength);
      const view = new DataView(arrayBuffer);
      
      // WAV header
      const writeString = (offset, str) => {
        for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
      };
      writeString(0, 'RIFF');
      view.setUint32(4, totalLength - 8, true);
      writeString(8, 'WAVE');
      writeString(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, format, true);
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * blockAlign, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bitDepth, true);
      writeString(36, 'data');
      view.setUint32(40, dataLength, true);
      
      // 写入采样数据
      const channels = [];
      for (let ch = 0; ch < numChannels; ch++) channels.push(buffer.getChannelData(ch));
      
      let offset = 44;
      for (let i = 0; i < buffer.length; i++) {
        for (let ch = 0; ch < numChannels; ch++) {
          const sample = Math.max(-1, Math.min(1, channels[ch][i]));
          view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
          offset += 2;
        }
      }
      
      return new Blob([arrayBuffer], { type: 'audio/wav' });
    }

    // 下载文件
    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    // 离线渲染合成鼓声
    async function renderDrum(synthFn, duration = 2) {
      const offlineCtx = new OfflineAudioContext(1, 44100 * duration, 44100);
      synthFn(offlineCtx, offlineCtx.destination);
      return await offlineCtx.startRendering();
    }

    // 创建噪声 buffer
    function createNoise(ctx) {
      const len = ctx.sampleRate * 2;
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
      return buf;
    }

    // ============ 鼓组合成定义 ============
    // (与 drumSynthesizer.ts 中的逻辑一致，但适配离线渲染)
    
    let _noiseCache = null;
    function getNoise(ctx) {
      if (!_noiseCache || _noiseCache.sampleRate !== ctx.sampleRate) {
        _noiseCache = createNoise(ctx);
      }
      return _noiseCache;
    }

    // 这里省略完整的合成定义，实际使用时请参考 drumSynthesizer.ts
    // 生成器会为每种鼓件创建一个离线渲染的 AudioBuffer 并导出为 WAV

    addLog('采样生成器已就绪。');
    addLog('提示：生成的文件需要手动放到 public/samples/ 对应目录下。');
    addLog('或者，你可以直接使用真实录音的采样文件替换。');
    addLog('');
    addLog('目录结构：');
    addLog('public/samples/');
    addLog('├── drums/');
    addLog('│   ├── acoustic/   (kick.mp3, snare.mp3, ...)');
    addLog('│   ├── electronic/ (kick.mp3, snare.mp3, ...)');
    addLog('│   └── chinese/    (tanggu.mp3, paigu.mp3, ...)');
    addLog('├── piano/          (C3.mp3, C4.mp3, ...)');
    addLog('└── chinese/');
    addLog('    ├── guzheng/    (D3.mp3, G3.mp3, ...)');
    addLog('    ├── erhu/       (D4.mp3, G4.mp3, ...)');
    addLog('    ├── pipa/       (A3.mp3, D4.mp3, ...)');
    addLog('    ├── dizi/       (D4.mp3, G4.mp3, ...)');
    addLog('    ├── xiao/       (D4.mp3, G4.mp3, ...)');
    addLog('    ├── yangqin/    (C3.mp3, G3.mp3, ...)');
    addLog('    └── zhongruan/  (D3.mp3, A3.mp3, ...)');

    async function generateAll() {
      addLog('\n开始生成所有采样...');
      addLog('注意：当前版本使用合成音色作为占位。');
      addLog('建议后续用真实录音替换以获得最佳音质。');
      addLog('合成音色已内置在应用中作为回退方案，无需额外文件即可使用。');
      setProgress(100);
    }
  </script>
</body>
</html>
